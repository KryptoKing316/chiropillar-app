<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ChiroPillar favicon · Escalating Pillar mark on navy chip · 16-256px -->
  <defs>
    <linearGradient id="f-block-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2EEE7"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
    <linearGradient id="f-block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="f-block-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A38436"/>
    </linearGradient>
  </defs>
  <!-- Navy chip backdrop -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="#0B1B3E"/>
  <!-- Escalating pillar marks -->
  <rect x="80" y="148" width="40"  height="18" rx="2.5" fill="url(#f-block-base)"/>
  <rect x="70" y="120" width="60"  height="18" rx="2.5" fill="url(#f-block)"/>
  <rect x="60" y="92"  width="80"  height="18" rx="2.5" fill="url(#f-block)"/>
  <rect x="50" y="64"  width="100" height="18" rx="2.5" fill="url(#f-block)"/>
  <rect x="40" y="36"  width="120" height="18" rx="3"   fill="url(#f-block-top)"/>
</svg>
