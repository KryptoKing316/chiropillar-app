<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ChiroPillar · Escalating Pillar · primary platform mark (replaces old mascot) -->
  <defs>
    <linearGradient id="m-block-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2EEE7"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
    <linearGradient id="m-block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="m-block-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A38436"/>
    </linearGradient>
    <filter id="m-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="m-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="78" y="148" width="44"  height="20" rx="2.5" fill="url(#m-block-base)" filter="url(#m-shadow)"/>
  <rect x="68" y="118" width="64"  height="20" rx="2.5" fill="url(#m-block)" filter="url(#m-shadow)"/>
  <rect x="58" y="88"  width="84"  height="20" rx="2.5" fill="url(#m-block)" filter="url(#m-shadow)"/>
  <rect x="48" y="58"  width="104" height="20" rx="2.5" fill="url(#m-block)" filter="url(#m-glow)"/>
  <rect x="38" y="28"  width="124" height="20" rx="3"   fill="url(#m-block-top)" filter="url(#m-shadow)"/>
</svg>
