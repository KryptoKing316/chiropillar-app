<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ESCALATING PILLAR · roll-up compounding · stacked blocks growing wider as they rise -->
  <defs>
    <linearGradient id="g1-block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="g1-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Base block (smallest, anchor) -->
  <rect x="78" y="148" width="44" height="20" rx="2" fill="url(#g1-block)"/>
  <!-- Block 2 -->
  <rect x="68" y="118" width="64" height="20" rx="2" fill="url(#g1-block)"/>
  <!-- Block 3 -->
  <rect x="58" y="88" width="84" height="20" rx="2" fill="url(#g1-block)"/>
  <!-- Top block (largest, glowing — the platform at scale) -->
  <rect x="48" y="58" width="104" height="20" rx="2" fill="url(#g1-block)" filter="url(#g1-glow)"/>
  <!-- Capstone -->
  <rect x="38" y="28" width="124" height="20" rx="3" fill="#F2EEE7"/>
</svg>
