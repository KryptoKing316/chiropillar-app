<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- NETWORK PILLAR · central column with connected nodes · platform/tech feel -->
  <defs>
    <linearGradient id="g2-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Connection lines (drawn first, behind nodes) -->
  <line x1="100" y1="50"  x2="48"  y2="50"  stroke="#C9A84C" stroke-width="2" opacity="0.60"/>
  <line x1="100" y1="80"  x2="152" y2="80"  stroke="#C9A84C" stroke-width="2" opacity="0.60"/>
  <line x1="100" y1="110" x2="48"  y2="110" stroke="#C9A84C" stroke-width="2" opacity="0.60"/>
  <line x1="100" y1="140" x2="152" y2="140" stroke="#C9A84C" stroke-width="2" opacity="0.60"/>
  <line x1="100" y1="170" x2="48"  y2="170" stroke="#C9A84C" stroke-width="2" opacity="0.60"/>
  <!-- Central pillar -->
  <rect x="92" y="30" width="16" height="160" rx="4" fill="url(#g2-bar)"/>
  <!-- Capstone -->
  <rect x="82" y="20" width="36" height="12" rx="2" fill="#F2EEE7"/>
  <!-- Node clinics (5 satellite practices) -->
  <circle cx="48"  cy="50"  r="9" fill="#E8C96A"/>
  <circle cx="152" cy="80"  r="9" fill="#E8C96A"/>
  <circle cx="48"  cy="110" r="9" fill="#E8C96A"/>
  <circle cx="152" cy="140" r="9" fill="#E8C96A"/>
  <circle cx="48"  cy="170" r="9" fill="#E8C96A"/>
</svg>
