<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" preserveAspectRatio="xMidYMid slice">
  <!-- Brand Brief cover visual · ChiroPillar palette + mascot -->

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#F7F0DC"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Mascot · top-left -->
  <g transform="translate(34, 38) scale(0.7)">
    <ellipse cx="100" cy="185" rx="76" ry="6" fill="#000000" opacity="0.18"/>
    <rect x="36" y="22" width="128" height="22" rx="3" fill="#EBD8A6" stroke="#7A6A45" stroke-width="1.5"/>
    <rect x="44" y="28" width="112" height="10" rx="2" fill="#F0E0B8"/>
    <rect x="52" y="44" width="96" height="112" fill="#EBD8A6" stroke="#7A6A45" stroke-width="1.5"/>
    <line x1="68"  y1="48" x2="68"  y2="152" stroke="#7A6A45" stroke-width="1.2" opacity="0.55"/>
    <line x1="84"  y1="48" x2="84"  y2="152" stroke="#7A6A45" stroke-width="1.2" opacity="0.55"/>
    <line x1="116" y1="48" x2="116" y2="152" stroke="#7A6A45" stroke-width="1.2" opacity="0.55"/>
    <line x1="132" y1="48" x2="132" y2="152" stroke="#7A6A45" stroke-width="1.2" opacity="0.55"/>
    <circle cx="82"  cy="84" r="7"   fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
    <circle cx="118" cy="84" r="7"   fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
    <circle cx="82"  cy="84" r="3.5" fill="#1F4E79"/>
    <circle cx="118" cy="84" r="3.5" fill="#1F4E79"/>
    <ellipse cx="68"  cy="100" rx="6" ry="3.5" fill="#F2B0A0" opacity="0.85"/>
    <ellipse cx="132" cy="100" rx="6" ry="3.5" fill="#F2B0A0" opacity="0.85"/>
    <path d="M 86 106 Q 100 118 114 106" stroke="#1F4E79" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M 150 76 Q 174 60 172 38" stroke="#EBD8A6" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M 150 76 Q 174 60 172 38" stroke="#7A6A45" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <circle cx="172" cy="36" r="8" fill="#EBD8A6" stroke="#7A6A45" stroke-width="1.5"/>
    <rect x="36" y="158" width="128" height="20" rx="3" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
  </g>

  <!-- Stylized title -->
  <text x="190" y="100" font-family="Georgia, 'Playfair Display', serif" font-size="44" font-weight="700" fill="#1F4E79" letter-spacing="-1">
    Brand Brief
  </text>
  <text x="190" y="134" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#7A6A45" letter-spacing="4">
    STRENGTH IN ALIGNMENT
  </text>

  <!-- Palette swatches · the six brand colors -->
  <g transform="translate(190, 170)">
    <!-- Spine Blue -->
    <rect x="0" y="0" width="58" height="58" rx="6" fill="#1F4E79"/>
    <text x="29" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#1F4E79" text-anchor="middle">SPINE</text>
    <text x="29" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#1F4E79</text>

    <!-- Align Blue -->
    <rect x="68" y="0" width="58" height="58" rx="6" fill="#2E75B6"/>
    <text x="97" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#2E75B6" text-anchor="middle">ALIGN</text>
    <text x="97" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#2E75B6</text>

    <!-- Globe Blue -->
    <rect x="136" y="0" width="58" height="58" rx="6" fill="#9CC4E4"/>
    <text x="165" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#1F4E79" text-anchor="middle">GLOBE</text>
    <text x="165" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#9CC4E4</text>

    <!-- Stone -->
    <rect x="204" y="0" width="58" height="58" rx="6" fill="#EBD8A6" stroke="#7A6A45" stroke-width="1"/>
    <text x="233" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#7A6A45" text-anchor="middle">STONE</text>
    <text x="233" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#EBD8A6</text>

    <!-- Gold -->
    <rect x="272" y="0" width="58" height="58" rx="6" fill="url(#goldGrad)"/>
    <text x="301" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#8B6914" text-anchor="middle">GOLD</text>
    <text x="301" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#C9A84C</text>

    <!-- Cheek Coral -->
    <rect x="340" y="0" width="58" height="58" rx="6" fill="#F2B0A0"/>
    <text x="369" y="78" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#C46C5C" text-anchor="middle">CHEEK</text>
    <text x="369" y="90" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A6A45" text-anchor="middle">#F2B0A0</text>
  </g>

  <!-- Typography sample · bottom strip -->
  <text x="190" y="320" font-family="Georgia, 'Playfair Display', serif" font-size="22" font-weight="700" fill="#1F4E79">
    Playfair Display · Inter · Mono
  </text>
  <text x="190" y="350" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#7A6A45" letter-spacing="2">
    Display serif · UI sans · Data mono
  </text>
</svg>
